<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060608;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
input,button,textarea{font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:0;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:.4}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes glow{0%,100%{box-shadow:0 0 30px rgba(124,111,255,.3)}50%{box-shadow:0 0 60px rgba(124,111,255,.6)}}

#phone{
  width:390px;height:844px;
  background:linear-gradient(160deg,#0D0D14 0%,#080810 50%,#0D0A14 100%);
  border-radius:48px;overflow:hidden;position:relative;
  display:flex;flex-direction:column;
  box-shadow:0 50px 120px rgba(0,0,0,.9),0 0 0 1px rgba(124,111,255,.2),inset 0 0 0 1px rgba(255,255,255,.03);
}
/* Subtle bg grid */
#phone::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(124,111,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,111,255,.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1;}

/* Nav */
#nav{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(to top,rgba(8,8,16,.98) 70%,transparent);
  padding:10px 0 26px;display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:6px 20px;transition:all .2s;border-radius:16px;}
.nb:active{background:rgba(124,111,255,.1);}
.nl{font-size:10px;font-weight:700;letter-spacing:.06em;transition:color .2s;}

/* Cards */
.clip-card{
  margin:0 16px 14px;
  background:linear-gradient(135deg,rgba(28,26,40,.9),rgba(20,18,32,.9));
  border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:18px;
  transition:all .3s;backdrop-filter:blur(10px);
}
.clip-card.playing{border-color:rgba(124,111,255,.5);box-shadow:0 0 30px rgba(124,111,255,.15),inset 0 0 30px rgba(124,111,255,.03);}
.clip-card:active{transform:scale(.99);}

/* Waveform */
.wf{display:flex;align-items:center;gap:3px;height:38px;}
.wb{width:3px;border-radius:99px;transition:height .08s ease;}

/* Misc */
.spinner{width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;animation:spin .7s linear infinite;}
.pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 12px;}
.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(4px);}
.sheet{background:linear-gradient(180deg,#161622,#0F0F1A);border-radius:28px 28px 0 0;width:100%;padding:26px;border-top:1px solid rgba(255,255,255,.08);}
.inp{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:15px 18px;color:#F0EEF8;font-size:15px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:rgba(124,111,255,.6);box-shadow:0 0 0 3px rgba(124,111,255,.1);}
.btn-primary{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#7C6FFF,#B06FFF);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 32px rgba(124,111,255,.4);
  transition:all .3s;position:relative;overflow:hidden;
}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);box-shadow:none;cursor:default;}
.tag-btn{flex:1;padding:8px 4px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.08);background:none;color:#7A7890;}
.scroll-area{flex:1;overflow-y:auto;padding-bottom:110px;}
</style>

function waveHTML(waves,color,prog){
  prog=prog||0;
  var h='<div class="wf">';
  for(var i=0;i<waves.length;i++){
    var ht=Math.max(waves[i]*100,6);
    var past=(i/waves.length)<prog;
    h+='<div class="wb" style="height:'+ht+'%;background:'+(past?color:color+'22')+';"></div>';
  }
  return h+'</div>';
}

// ── Audio utils ────────────────────────────────────────────────────────────────
function toWav(buf){
  var nc=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length;
  var ab=new ArrayBuffer(44+len*nc*2),dv=new DataView(ab);
  function ws(o,s){for(var i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');dv.setUint32(4,36+len*nc*2,true);ws(8,'WAVE');ws(12,'fmt ');
  dv.setUint32(16,16,true);dv.setUint16(20,1,true);dv.setUint16(22,nc,true);
  dv.setUint32(24,sr,true);dv.setUint32(28,sr*nc*2,true);
  dv.setUint16(32,nc*2,true);dv.setUint16(34,16,true);
  ws(36,'data');dv.setUint32(40,len*nc*2,true);
  var off=44;
  for(var i=0;i<len;i++)for(var c=0;c<nc;c++){
    var s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));
    dv.setInt16(off,s<0?s*0x8000:s*0x7FFF,true);off+=2;
  }
  return new Blob([ab],{type:'audio/wav'});
}
function pitch(blob,cb){
  var fr=new FileReader();
  fr.onload=function(e){
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    ctx.decodeAudioData(e.target.result.slice(0),function(dec){
      var rate=Math.pow(2,5/12);
      var oc=new OfflineAudioContext(dec.numberOfChannels,Math.ceil(dec.length/rate),dec.sampleRate);
      var src=oc.createBufferSource();src.buffer=dec;src.playbackRate.value=rate;
      src.connect(oc.destination);src.start(0);
      oc.startRendering().then(function(r){ctx.close();cb(URL.createObjectURL(toWav(r)));})
        .catch(function(){ctx.close();cb(URL.createObjectURL(blob));});
    },function(){cb(URL.createObjectURL(blob));});
  };
  fr.readAsArrayBuffer(blob);
}

function R(h){document.getElementById('app').innerHTML=h;}

function dchk(el){

function tLike(id){

}
function tPlay(id){
  var c=fc(id);if(!c||!c.url)return;
  if(pId&&pId!==id)stopP(pId);
  if(!players[id]){players[id]=new Audio(c.url);players[id].onended=function(){stopP(id);};}
  if(pId===id){stopP(id);}
  else{
    players[id].play();pId=id;
    var card=document.getElementById('card-'+id);if(card)card.classList.add('playing');
    var pb=document.getElementById('pb-'+id);
    if(pb){pb.innerHTML=svg('pause',16,'#fff');pb.style.background='linear-gradient(135deg,'+D+',#C0003A)';pb.style.boxShadow='0 4px 16px rgba(255,92,122,.3)';}
    animW(id,c,players[id]);
  }
}
function stopP(id){
  if(players[id])players[id].pause();
  pId=null;cancelAnimationFrame(pRaf);
  var card=document.getElementById('card-'+id);if(card)card.classList.remove('playing');
  var pb=document.getElementById('pb-'+id);
  var c=fc(id);
  if(pb&&c){pb.innerHTML=svg('play',16,'#fff');pb.style.background='linear-gradient(135deg,'+A+',#6040E0)';pb.style.boxShadow='0 4px 16px '+AG;}
  var w=document.getElementById('wv-'+id);if(w&&c)w.innerHTML=waveHTML(c.waves,A,0);
}
function animW(id,c,a){
  var w=document.getElementById('wv-'+id);if(!w)return;
  var p=a.currentTime/((a.duration||c.dur)||8);
  w.innerHTML=waveHTML(c.waves,A,p);
  pRaf=requestAnimationFrame(function(){animW(id,c,a);});
}

      '<div>'+
        '<h2 style="font-family:\'Syne\',sans-serif;font-size:20px;font-weight:800;color:'+T+';">New Whisper</h2>'+

function rClk(){if(rP==='idle')startRec();else if(rP==='recording')stopRec();}

function startRec(){
  var e=document.getElementById('merr');if(e)e.style.display='none';
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showErr('Your browser does not support mic access. Please open this page in Chrome via a hosted link (not as a local file).');return;
  }
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
    rStream=stream;
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var src=ctx.createMediaStreamSource(stream);
    rAn=ctx.createAnalyser();rAn.fftSize=256;src.connect(rAn);
    rChunks=[];
    var mime='audio/webm';
    try{if(!MediaRecorder.isTypeSupported(mime))mime=MediaRecorder.isTypeSupported('audio/ogg')?'audio/ogg':'';}catch(ex){mime='';}
    rRec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    rRec.ondataavailable=function(ev){if(ev.data&&ev.data.size>0)rChunks.push(ev.data);};
    rRec.onstop=function(){
      var blob=new Blob(rChunks,{type:rRec.mimeType||'audio/webm'});
      rP='processing';drawRec();
      pitch(blob,function(url){
        rUrl=url;
        if(rStream)rStream.getTracks().forEach(function(t){t.stop();});
        cancelAnimationFrame(rAnim);
        rP='preview';drawRec();
      });
    };
    rRec.start(100);rP='recording';rE=0;drawRec();liveWave();
    rTmr=setInterval(function(){
      rE=parseFloat((rE+0.1).toFixed(1));
      if(rE>=8){stopRec();return;}
      var ring=document.getElementById('rring');
      if(ring){var rv=70,c=2*Math.PI*rv;ring.setAttribute('stroke-dashoffset',c*(1-rE/8));}
      var all=document.querySelectorAll('div');
      for(var i=0;i<all.length;i++){
        if(all[i].style.fontSize==='42px'){
          all[i].innerHTML=rE.toFixed(1)+'<span style="font-size:20px;color:'+M+';">/8</span>';break;
        }
      }
    },100);
  }).catch(function(err){
    var msg='Microphone access denied.';
    if(err&&err.name==='NotFoundError')msg='No microphone found.';
    else if(err&&err.name==='NotAllowedError')msg='Mic permission denied. This app must be opened via a hosted link (https://) \u2014 not as a local file. Try uploading to Netlify Drop.';
    showErr(msg);
  });
}
function showErr(msg){var e=document.getElementById('merr');if(e){e.innerHTML=msg;e.style.display='block';}}
function liveWave(){
  if(!rAn)return;
  var d=new Uint8Array(rAn.frequencyBinCount);rAn.getByteFrequencyData(d);
  var step=Math.floor(d.length/24);rLW=[];
  for(var i=0;i<24;i++){
    var sl=d.slice(i*step,(i+1)*step),sum=0;
    for(var j=0;j<sl.length;j++)sum+=sl[j];
    rLW.push(Math.max(0.06,sum/sl.length/255));
  }
  var w=document.getElementById('rwave');if(w)w.innerHTML=waveHTML(rLW,A,0);
  rAnim=requestAnimationFrame(liveWave);
}
function stopRec(){
  clearInterval(rTmr);cancelAnimationFrame(rAnim);
  rFW=rLW.slice();
  if(rRec&&rRec.state==='recording')rRec.stop();
}
function setRTag(t){rTag=t;drawRec();}
function doPost(){
  var dur=Math.round(rE)||8;
  clips.unshift({id:'u'+Date.now(),school:'JMI Student',dept:dept||'JMI Student',time:'just now',dur:dur,waves:rFW.slice(),tag:rTag,hearts:0,url:rUrl,liked:false,reported:false});
  rP='done';drawRec();
  setTimeout(function(){go('feed');},900);
}
function resetRec(){
  clearInterval(rTmr);cancelAnimationFrame(rAnim);
  if(rStream)rStream.getTracks().forEach(function(t){t.stop();});
  Record();
}
